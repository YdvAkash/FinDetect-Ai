name: Spring Boot CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR=/home/ubuntu/app
            
            # Ensure directory exists and navigate to it
            mkdir -p $APP_DIR
            cd $APP_DIR
            
            # Stop old application gracefully
            echo "Stopping old application..."
            pkill -f 'java.*-jar' || true
            sleep 5
            
            # Find the JAR file
            JAR_FILE=$(ls *.jar 2>/dev/null | head -n 1)
            
            if [ -z "$JAR_FILE" ]; then
              echo "Error: No JAR file found!"
              exit 1
            fi
            
            echo "Deploying $JAR_FILE"
            
            # Start new application with memory limits to prevent EC2 freezing
            # Output is redirected to prevent SSH from hanging
            nohup java -Xmx256m -Xms256m -jar "$JAR_FILE" > app.log 2>&1 < /dev/null &
            
            # Give it a moment to start
            sleep 5
            
            echo "Running Java processes:"
            ps -ef | grep java | grep -v grep || echo "No java process running."
            
            echo "Application log (first few lines):"
            head -n 20 app.log